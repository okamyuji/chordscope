# chordscope 設定ファイルの例
[discovery]
roots = ["~/Music", "~/Downloads"]
extensions = ["mp3", "wav", "flac", "ogg", "aac", "aiff", "mp4", "m4a"]

[output]
directory = "~/music-analysis-out"
formats = ["console", "json", "markdown", "narrative"]
plots = true

[analysis]
genre = true
# "auto" は AST top-K のジャンル推論結果に応じて動的に解析対象を選ぶ
style = ["auto"]
style_top_k = 5
chord_engine = "madmom"
